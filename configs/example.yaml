# ARAG environment setup (SQLite + Zilliz Cloud + BGE)

llm:
  # API key 
  api_key: "Need your LLM API Key here "
  base_url:
  model: "qwen3.5-flash" # name of the model which you want to use
  temperature: 0.0
  max_tokens: 4096
  reasoning_effort: "medium" 

embedding:
  # we used this for chinese sentences embedding, for English you can use bge-large-en-v1.5
  model: "/root/autodl-tmp/models/bge-large-zh-v1.5"
  device: "cuda:0" 
  batch_size: 16

agent:
  max_loops: 15
  max_token_budget: 128000
  verbose: true

data:
  # we did the experiment on AutoDL platform, need your local path here
  chunks_file: "/root/autodl-tmp/arag_data/chunks.json"
  questions_file: "data/raw_pdfs/test_questions.json"

output:
  results_dir: "results/zilliz_test"